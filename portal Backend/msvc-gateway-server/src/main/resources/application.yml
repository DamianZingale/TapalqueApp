server:
  port: 8090

spring:
  application:
    name: MSVC-GATEWAY-SERVER

  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: msvc-comercio
          uri: lb://MSVC-COMERCIO
          predicates:
            - Path=/api/comercio/**

        - id: msvc-hospedajes
          uri: lb://MSVC-HOSPEDAJES
          predicates:
            - Path=/api/hospedajes/**
          filters:
            - JwtAuth

        - id: msvc-gastronomia-public
          uri: lb://MSVC-GASTRONOMIA
          predicates:
            - Path=/api/gastronomia/findAll
            - Path=/api/gastronomia/findById/**
            - Path+=/gastronomia/public/menu/**


        - id: msvc-gastronomia-private
          uri: lb://MSVC-GASTRONOMIA
          predicates:
            - Path=/api/gastronomia/save
          filters:
            - JwtAuth

        - id: msvc-jwt
          uri: lb://MSVC-JWT
          predicates:
            - Path=/api/jwt/**
          filters:
            - JwtAuth

        - id: msvc-user
          uri: lb://MSVC-USER
          predicates:
            - Path=/api/user/**
          filters:
            - JwtAuth

        - id: msvc-mercado-pago
          uri: lb://MSVC-MERCADO-PAGO
          predicates:
            - Path=/api/mercadopago/**
          filters:
            - JwtAuth

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka